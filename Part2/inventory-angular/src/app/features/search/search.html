<h1>Search Inventory</h1>

<form [formGroup]="searchForm">
  <div class="search-box">
    <input formControlName="keyword" placeholder="Search by item name...">
    <button (click)="search()">Search</button>
    <button (click)="showPopular()">Show Popular</button>
  </div>
</form>

<div *ngIf="results.length > 0">
  <h3>Found: {{ results.length }} item(s)</h3>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of results">
        <td>{{ item.itemId }}</td>
        <td>{{ item.itemName }}</td>
        <td>{{ item.category }}</td>
        <td>${{ item.price.toFixed(2) }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div *ngIf="results.length === 0 && searchForm.value.keyword">
  <p>No items found</p>
</div>
